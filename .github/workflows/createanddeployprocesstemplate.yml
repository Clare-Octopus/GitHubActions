name: DeployPackageProcessTemplate

on:
  push:
    branches: 
      - main
jobs:
  octopus-deployment:
    runs-on: ubuntu-latest
    env:
      OCTOPUS_SPACE: 'Clare'
      OCTOPUS_API_KEY: ${{ secrets.OCTOPUS_API_KEY }}
      OCTOPUS_URL: ${{ secrets.OCTOPUS_URL }}

    steps:
    # Action to Create a Release
    - name: Create a release in Octopus Deploy 🐙
      uses: OctopusDeploy/create-release-action@v3
      with:
        project: 'PlatformHubPackageDeploy'
        release_number: '2.1.6'
        channel: 'Ephemeral Environments'
        git_ref: ${{ (github.ref_type == 'tag' && github.event.repository.default_branch ) || (github.head_ref || github.ref) }}
        git_commit: ${{ github.event.after || github.event.pull_request.head.sha }}
        packages: |
         Run a Process Template-Deploy a Package:2.0.0
         Deploy a Package:2.0.0
         
